stages:
  data_ingestion:
    cmd: python -m src.pipeline.stage_01_data_ingestion
    deps:
      - src/pipeline/stage_01_data_ingestion.py
      - src/components/data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion

  data_validation:
    cmd: python -m src.pipeline.stage_02_data_validation
    deps:
      - src/pipeline/stage_02_data_validation.py
      - src/components/data_validation.py
      - config/config.yaml
      - schema.yaml
      - artifacts/data_ingestion/raw.csv
    outs:
      - artifacts/data_validation/status.txt

  data_transformation:
    cmd: python -m src.pipeline.stage_03_data_transformation
    deps:
      - src/pipeline/stage_03_data_transformation.py
      - src/components/data_transformation.py
      - artifacts/data_ingestion/train.csv
      - artifacts/data_ingestion/test.csv
      - artifacts/data_validation/status.txt
    outs:
      - artifacts/data_transformation/preprocessor.pkl



  model_trainer:
    cmd: python -m src.pipeline.stage_04_model_trainer
    deps:
      - src/pipeline/stage_04_model_trainer.py
      - src/components/model_trainer.py
      - artifacts/data_transformation/preprocessor.pkl
      - artifacts/data_ingestion/train.csv
    params:
      - RandomForestRegressor
      - DecisionTreeRegressor
      - GradientBoostingRegressor
    outs:
      - artifacts/model_trainer/model.joblib

  


  model_evaluation:
    cmd: python -m src.pipeline.stage_05_model_evaluation
    deps:
      - src/pipeline/stage_05_model_evaluation.py
      - src/components/model_evaluation.py
      - artifacts/data_ingestion/test.csv
      - artifacts/data_transformation/preprocessor.pkl
      - artifacts/model_trainer/model.joblib
    metrics:
      - artifacts/model_evaluation/metrics.json:
          cache: false