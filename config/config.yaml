  raw_data_path: artifacts/data_ingestion/raw.csv
  train_data_path: artifacts/data_ingestion/train.csv
  test_data_path: artifacts/data_ingestion/test.csv
  test_size: 0.2




data_validation:
  artifact_dir: artifacts/data_validation
  raw_data_path: artifacts/data_ingestion/raw.csv
