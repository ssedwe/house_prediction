<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>House Price Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        .result { text-align: center; font-size: 24px; color: #007bff; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏠 AI House Price Predictor</h2>

    {% if results %}
        <div class="result">Predicted Price: {{ results }}</div><hr>
    {% endif %}

    <form action="/predict" method="post">
        <div class="form-group"><label>Bedrooms</label><input type="number" name="bedrooms" value="3" required></div>
        <div class="form-group"><label>Bathrooms</label><input type="number" step="0.25" name="bathrooms" value="2" required></div>
        <div class="form-group"><label>Sqft Living</label><input type="number" name="sqft_living" value="1500" required></div>
        <div class="form-group"><label>Sqft Lot</label><input type="number" name="sqft_lot" value="5000" required></div>
        <div class="form-group"><label>Floors</label><input type="number" step="0.5" name="floors" value="1" required></div>
        <div class="form-group"><label>Waterfront (0 or 1)</label><input type="number" name="waterfront" value="0" min="0" max="1" required></div>
        <div class="form-group"><label>View (0-4)</label><input type="number" name="view" value="0" min="0" max="4" required></div>
        <div class="form-group"><label>Condition (1-5)</label><input type="number" name="condition" value="3" min="1" max="5" required></div>
        <div class="form-group"><label>Grade (1-13)</label><input type="number" name="grade" value="7" min="1" max="13" required></div>
        <div class="form-group"><label>Sqft Above</label><input type="number" name="sqft_above" value="1500" required></div>
        <div class="form-group"><label>Sqft Basement</label><input type="number" name="sqft_basement" value="0" required></div>
        <div class="form-group"><label>Year Built</label><input type="number" name="yr_built" value="1990" required></div>
        <div class="form-group"><label>Year Renovated (0 if none)</label><input type="number" name="yr_renovated" value="0" required></div>
        <div class="form-group"><label>Zipcode</label><input type="number" name="zipcode" value="98178" required></div>
        <div class="form-group"><label>Latitude</label><input type="number" step="any" name="lat" value="47.5112" required></div>
        <div class="form-group"><label>Longitude</label><input type="number" step="any" name="long" value="-122.257" required></div>
        <div class="form-group"><label>Sqft Living 15</label><input type="number" name="sqft_living15" value="1500" required></div>
        <button type="submit" class="btn">Predict Price</button>
    </form>
</div>

</body>
</html>
