<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #555; font-size: 14px;}
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 15px; }
        .full-width { grid-column: span 2; margin-top: 20px; }
        button { width: 100%; padding: 15px; background-color: #3498db; color: white; border: none; border-radius: 5px; font-size: 18px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 25px; padding: 15px; background-color: #e8f8f5; border-left: 5px solid #1abc9c; color: #16a085; font-size: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>House Price Predictor Engine</h2>
        <form action="/predict" method="post">
            <div class="form-grid">
                <div class="form-group"><label>Bedrooms</label><input type="number" step="any" name="bedrooms" required></div>
                <div class="form-group"><label>Bathrooms</label><input type="number" step="any" name="bathrooms" required></div>
                <div class="form-group"><label>Sqft Living</label><input type="number" name="sqft_living" required></div>
                <div class="form-group"><label>Sqft Lot</label><input type="number" name="sqft_lot" required></div>
                <div class="form-group"><label>Floors</label><input type="number" step="any" name="floors" required></div>
                <div class="form-group"><label>Waterfront (0/1)</label><input type="number" name="waterfront" required></div>
                <div class="form-group"><label>View (0-4)</label><input type="number" name="view" required></div>
                <div class="form-group"><label>Condition (1-5)</label><input type="number" name="condition" required></div>
                <div class="form-group"><label>Grade (1-13)</label><input type="number" name="grade" required></div>
                <div class="form-group"><label>Sqft Above</label><input type="number" name="sqft_above" required></div>
                <div class="form-group"><label>Sqft Basement</label><input type="number" name="sqft_basement" required></div>
                <div class="form-group"><label>Year Built</label><input type="number" name="yr_built" required></div>
                <div class="form-group"><label>Year Renovated</label><input type="number" name="yr_renovated" required></div>
                <div class="form-group"><label>Zipcode</label><input type="number" name="zipcode" required></div>
                <div class="form-group"><label>Latitude</label><input type="number" step="any" name="lat" required></div>
                <div class="form-group"><label>Longitude</label><input type="number" step="any" name="long" required></div>
                <div class="form-group"><label>Sqft Living 2015</label><input type="number" name="sqft_living15" required></div>
            </div>
            <div class="full-width">
                <button type="submit">Predict Price</button>
            </div>
        </form>
        {% if results %}
        <div class="result-box">Est. Value: {{ results }}</div>
        {% endif %}
    </div>
</body>
</html>
