<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise House Predictor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏡 House Price Predictor</h1>
        <form id="predict-form">
            <div class="grid">
                <div class="input-group">
                    <label>Bedrooms</label>
                    <input type="number" id="bedrooms" value="3" required>
                </div>
                <div class="input-group">
                    <label>Bathrooms</label>
                    <input type="number" step="0.25" id="bathrooms" value="2.0" required>
                </div>
                <div class="input-group">
                    <label>Floors</label>
                    <input type="number" step="0.5" id="floors" value="1.0" required>
                </div>

                <div class="input-group">
                    <label>Sqft Living</label>
                    <input type="number" id="sqft_living" value="1500" required>
                </div>
                <div class="input-group">
                    <label>Sqft Lot</label>
                    <input type="number" id="sqft_lot" value="5000" required>
                </div>
                <div class="input-group">
                    <label>Sqft Above</label>
                    <input type="number" id="sqft_above" value="1000" required>
                </div>
                <div class="input-group">
                    <label>Sqft Basement</label>
                    <input type="number" id="sqft_basement" value="500" required>
                </div>
                <div class="input-group">
                    <label>Sqft Living (15 Neighbors)</label>
                    <input type="number" id="sqft_living15" value="1500" required>
                </div>

                <div class="input-group">
                    <label>Condition (1-5)</label>
                    <input type="number" id="condition" value="3" min="1" max="5" required>
                </div>
                <div class="input-group">
                    <label>Grade (1-13)</label>
                    <input type="number" id="grade" value="7" min="1" max="13" required>
                </div>
                <div class="input-group">
                    <label>Waterfront (0 or 1)</label>
                    <input type="number" id="waterfront" value="0" min="0" max="1" required>
                </div>
                <div class="input-group">
                    <label>View (0-4)</label>
                    <input type="number" id="view" value="0" min="0" max="4" required>
                </div>

                <div class="input-group">
                    <label>Year Built</label>
                    <input type="number" id="yr_built" value="1990" required>
                </div>
                <div class="input-group">
                    <label>Year Renovated (0 if none)</label>
                    <input type="number" id="yr_renovated" value="0" required>
                </div>
                <div class="input-group">
                    <label>Zipcode</label>
                    <input type="number" id="zipcode" value="98000" required>
                </div>
                <div class="input-group">
                    <label>Latitude</label>
                    <input type="number" step="0.0001" id="lat" value="47.5112" required>
                </div>
                <div class="input-group">
                    <label>Longitude</label>
                    <input type="number" step="0.0001" id="long" value="-122.2570" required>
                </div>
            </div>

            <button type="submit" id="submit-btn">Predict Price</button>
        </form>
        
        <div id="result" class="hidden">
            <h2>Estimated Price: <span id="price-value"></span></h2>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
