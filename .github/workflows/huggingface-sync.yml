name: Sync to Hugging Face Hub

# This tells the drone to wake up every time you push to the 'main' branch
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          
      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # FIXED: Used the exact Space name "House-Price-Predictor"
          git remote add huggingface https://shashi2160:$HF_TOKEN@huggingface.co/spaces/shashi2160/House-Price-Predictor
          
          git push -f huggingface main