name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  # This allows you to manually trigger the deployment from the GitHub Actions tab!
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://ssedwe:$HF_TOKEN@huggingface.co/spaces/ssedwe/house-prediction main