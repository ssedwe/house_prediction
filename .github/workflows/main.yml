name: Enterprise MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # STAGE 1: CONTINUOUS INTEGRATION (TESTING)
  # ==========================================
  integration-and-testing:
    runs-on: ubuntu-latest
    
    # We spin up a temporary MongoDB service strictly for test_data_ingestion.py
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio uvicorn

      - name: Start FastAPI Server in Background
        # We start the server so test_api.py can actually hit http://localhost:8000
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MONGODB_URL: "mongodb://localhost:27017"
        run: |
          uvicorn backend.src.api:app --host 0.0.0.0 --port 8000 &
          sleep 15 # Wait for the model to download from DagsHub and API to boot

      - name: Run Pytest Suite
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MONGODB_URL: "mongodb://localhost:27017"
        run: |
          pytest -v

  # ==========================================
  # STAGE 2: CONTINUOUS DELIVERY (DOCKER)
  # ==========================================
  build-and-push-docker:
    needs: integration-and-testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/house-prediction-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/house-prediction-backend:latest

      - name: Build and Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/house-prediction-web:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/house-prediction-web:latest

  # ==========================================
  # STAGE 3: CONTINUOUS DEPLOYMENT (RENDER)
  # ==========================================
  deploy-to-render:
    needs: build-and-push-docker
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Backend Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_WEBHOOK }}"

      - name: Trigger Frontend Deployment
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_WEBHOOK }}"